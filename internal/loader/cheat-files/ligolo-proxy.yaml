tool: ligolo-proxy
tags: [pivoting, network, tunneling, proxy, pentest, security]

# === LISTENER CONFIGURATION ===

actions:
  - title: ligolo-proxy - basic listener
    desc: |
      Starts a basic proxy listener on all available interfaces using the default port. 
      This is the standard starting point for the Ligolo-ng server to accept incoming connections from remote agents. 
      By default, it looks for certificate files in the certs directory to establish a TLS connection.
    command: "ligolo-proxy -laddr {{listening_address|0.0.0.0:11601}}"

  - title: ligolo-proxy - self-signed certificate mode
    desc: |
      Automatically generates and uses self-signed TLS certificates for the session. 
      This is useful for rapid deployment when you do not have pre-existing certificates or a public domain. 
      It ensures that the communication between the agent and the proxy remains encrypted despite the lack of a trusted CA.
    command: "ligolo-proxy -selfcert -selfcert-domain {{domain|ligolo}}"

  - title: ligolo-proxy - custom certificate files
    desc: |
      Starts the proxy using specific paths for the TLS certificate and private key files. 
      Use this when you have purchased a certificate or generated one using an internal Certificate Authority. 
      Ensure that the user running the proxy has read permissions for the specified file paths.
    command: "ligolo-proxy -certfile {{cert_path|certs/cert.pem}} -keyfile {{key_path|certs/key.pem}}"

# === ADVANCED MODES ===

  - title: ligolo-proxy - automated Let's Encrypt (autocert)
    desc: |
      Requests and manages TLS certificates automatically via Let's Encrypt. 
      This mode requires port 80 to be accessible from the internet to complete the ACME challenge. 
      It is ideal for long-term setups on public-facing servers where valid certificates are preferred for stealth or compatibility.
    command: "ligolo-proxy -autocert -allow-domains {{domains|example.com}}"

  - title: ligolo-proxy - websocket listener
    desc: |
      Configures the proxy to listen using a websocket transport layer. 
      Prefixing the address with https:// enables encrypted websocket communication, which can help bypass certain restrictive firewalls or load balancers. 
      This is a powerful feature for tunneling traffic through environments that only allow web-based protocols.
    command: "ligolo-proxy -laddr {{websocket_address|https://0.0.0.0:443}}"

# === OPERATIONAL MODES ===

  - title: ligolo-proxy - daemon mode
    desc: |
      Runs the proxy server in the background as a daemon without an interactive command-line interface. 
      This is suitable for persistent installations on a jump box where you don't need to interact with the proxy shell. 
      Note that you will need to manage the process via standard OS tools (like kill or systemctl) once started.
    command: "ligolo-proxy -daemon -laddr {{listening_address|0.0.0.0:11601}}"

  - title: ligolo-proxy - verbose logging
    desc: |
      Starts the proxy with verbose output enabled to provide more detailed information about connections and errors. 
      This is highly recommended for troubleshooting initial connectivity issues between the agent and the proxy. 
      It displays metadata about incoming agent registrations and potential TLS handshake failures.
    command: "ligolo-proxy -v"

  - title: ligolo-proxy - skip banner
    desc: |
      Launches the proxy server without displaying the ASCII art banner at startup. 
      This is useful when logging the output to a file or when running the tool in a clean terminal environment. 
      It does not affect the functionality of the proxy itself, only the visual feedback upon launch.
    command: "ligolo-proxy -nobanner"

# === PROFILING AND CONFIG ===

  - title: ligolo-proxy - custom configuration file
    desc: |
      Specifies a configuration file to load settings from rather than passing them via command line arguments. 
      This allows for more complex or reusable configurations that can be version controlled or easily shared. 
      The format of the config file must match the expected structure required by the tool.
    command: "ligolo-proxy -config {{config_file|config.yaml}}"

  - title: ligolo-proxy - performance profiling
    desc: |
      Writes a CPU profile to a specified file for performance analysis. 
      This is generally used by developers or advanced users to diagnose high CPU usage or bottlenecks in the proxy. 
      The resulting file can be analyzed using standard Go profiling tools like pprof.
    command: "ligolo-proxy -cpuprofile {{profile_name|cpu.prof}}"