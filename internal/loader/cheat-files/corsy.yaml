tool: corsy
tags: [web, security, pentest, reconnaissance, vulnerability-scanner, cors]

actions:
# === BASIC SCANNING ===
 - title: corsy - basic url scan
   desc: |
     Performs a standard CORS misconfiguration scan on a single target URL. 
     This command initiates various bypass tests such as Null origin, backtick, and unescaped dot bypasses. 
     It is the most efficient way to quickly check a specific endpoint for common vulnerabilities. 
     Ensure the URL includes the protocol (http/https) for accurate results.
   command: "corsy -u {{url}}"

 - title: corsy - scan urls from file
   desc: |
     Scans multiple targets by reading a list of URLs from a specified text file. 
     This is useful for bulk scanning subdomains or endpoints discovered during the reconnaissance phase. 
     The input file should contain one URL per line including the protocol. 
     Using this feature saves time compared to manual individual testing.
   command: "corsy -i {{input_file}}"

 - title: corsy - scan from stdin
   desc: |
     Allows for scanning URLs passed through the standard input (stdin). 
     This is highly effective when piping output from other discovery tools like subfinder or waybackurls. 
     It enables seamless integration into automated bug bounty or penetration testing pipelines. 
     Make sure the incoming data is formatted as a clean list of URLs.
   command: "cat {{url_list}} | corsy"

# === OUTPUT AND REPORTING ===
 - title: corsy - export results to json
   desc: |
     Saves the results of the CORS scan into a JSON formatted file for later analysis. 
     JSON output is ideal for documentation or for feeding the data into other custom scripts and databases. 
     This command is typically used in conjunction with a file input for large-scale assessments. 
     If the output file already exists, verify if the tool overwrites or appends to it.
   command: "corsy -i {{input_file}} -o {{output_file|results.json}}"

 - title: corsy - quiet mode scan
   desc: |
     Runs the scan while suppressing non-essential output like descriptions, severity levels, and exploitation tips. 
     This provides a cleaner output that focuses strictly on the vulnerable findings. 
     Use this when you are already familiar with the vulnerabilities and want to reduce terminal noise. 
     It is particularly helpful for automated logging or when the user requires minimal distraction.
   command: "corsy -u {{url}} -q"

# === PERFORMANCE AND EVASION ===
 - title: corsy - multi-threaded scan
   desc: |
     Increases the scanning speed by specifying the number of concurrent threads to use. 
     The default thread count is usually sufficient, but increasing it can drastically reduce scan time for large files. 
     Be cautious as high thread counts might cause the target server to block your IP or trigger rate limits. 
     Adjust the value based on the stability and capacity of the target environment.
   command: "corsy -u {{url}} -t {{thread_count|20}}"

 - title: corsy - request delay
   desc: |
     Introduces a specific delay in seconds between each HTTP request sent by the tool. 
     This is a critical setting for bypassing rate-limiting mechanisms or Web Application Firewalls (WAFs). 
     Using a delay makes the scanning behavior appear less aggressive and more like human interaction. 
     It is recommended for targets that are known to be sensitive or have strict anti-automation policies.
   command: "corsy -u {{url}} -d {{delay_seconds|2}}"

# === ADVANCED CONFIGURATION ===
 - title: corsy - scan with custom headers
   desc: |
     Sends custom HTTP headers such as User-Agents or Session Cookies with every request. 
     This is necessary for testing authenticated endpoints or mimicking specific browser behaviors. 
     Multiple headers can be provided by using newline characters within the header string. 
     Properly authenticated scans often reveal CORS issues that are hidden behind login portals.
   command: "corsy -u {{url}} --headers \"{{headers|Cookie: session=123}}\""