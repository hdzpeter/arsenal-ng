tool: k8scan
tags: [kubernetes, k8s, security, scanner, pentest, devops, enumeration, rbac]

# === SCANNING OPERATIONS ===

actions:
  - title: k8scan - perform basic cluster scan
    desc: |
      Initiate a basic, read-only security scan across the entire Kubernetes cluster. This command identifies common misconfigurations and security risks without making changes to the environment. It is ideal for a quick overview of the cluster's current security posture. No administrative changes are made during this process.
    command: "k8scan scan"

  - title: k8scan - scan excluding system namespaces
    desc: |
      Run a security scan while skipping system-related namespaces like kube-system and kube-public. This helps focus on user-deployed applications and services where configuration errors are more common. Use this to reduce noise from infrastructure components that are often managed by cloud providers. It streamlines the remediation process for application developers.
    command: "k8scan scan --exclude-system"

  - title: k8scan - scan specific namespace
    desc: |
      Target a specific Kubernetes namespace for a focused security evaluation. This is particularly useful in multi-tenant clusters or when auditing a specific project's environment. Ensure you have the necessary RBAC permissions to read resources within the specified namespace. It prevents unnecessary processing of the entire cluster.
    command: "k8scan scan --namespace {{namespace_name}}"

  - title: k8scan - scan filtered by severity
    desc: |
      Filter the scan results to display only findings that match a specific severity level. Available levels usually include CRITICAL, HIGH, MEDIUM, LOW, and ALL. This allows security teams to prioritize remediation efforts on the most impactful vulnerabilities first. It is highly recommended for high-traffic production environments.
    command: "k8scan scan --severity {{severity_level|CRITICAL}}"

  - title: k8scan - scan specific security category
    desc: |
      Perform a scan focused on a specific category of security checks, such as RBAC or Secret Management. This helps in deep-diving into particular areas of concern without processing unrelated findings. Use the list-categories command to see all available audit types supported by the tool. This is useful for targeted compliance checks.
    command: "k8scan scan --category {{category_name|RBAC}}"

  - title: k8scan - show top findings
    desc: |
      Limit the output to only show the top N findings discovered during the scan. This is useful for quickly identifying the most glaring issues in a large cluster with many resources. Use this flag to keep the terminal output concise and actionable. It helps avoid "alert fatigue" during initial assessments.
    command: "k8scan scan --top {{finding_count|10}}"

# === REPORTING AND OUTPUT ===

  - title: k8scan - generate full audit report
    desc: |
      Generate comprehensive reports in multiple formats including HTML, JSON, and terminal output simultaneously. This is essential for creating documentation for compliance audits or sharing results with other teams. Custom filenames can be specified to organize periodic audit trails. Ensure you have write permissions in the target directory.
    command: "k8scan scan --output {{output_format|all}} -f {{filename|security-audit}}"

  - title: k8scan - scan and serve report
    desc: |
      Run a full cluster scan and immediately launch the built-in web server to view the results. This provides a convenient way to interact with HTML reports without manually opening files. The server will host the report on a specified port, which defaults to 8000 if not provided. This is the fastest way to visualize findings in a browser.
    command: "k8scan scan --exclude-system --output html --serve --port {{port|9000}}"

# === UTILITIES AND SERVING ===

  - title: k8scan - serve existing report files
    desc: |
      Start a secure HTTP server to host previously generated report files. This command is useful for sharing audit results with colleagues over a network using a temporary endpoint. Note that the server automatically shuts down after 30 minutes for security purposes. You can specify multiple files to be served at once.
    command: "k8scan serve {{report_path|reports/security-audit.html}} --port {{port|8000}}"

  - title: k8scan - list available scan categories
    desc: |
      Retrieve a list of all supported vulnerability and configuration categories that the tool can audit. This allows users to understand the scope of the scanner and identify specific modules for targeted scans. It is a helpful reference before running category-specific commands. No cluster connectivity is required for this informational command.
    command: "k8scan list-categories"

  - title: k8scan - show usage examples
    desc: |
      Display a collection of practical command-line examples directly in the terminal output. This provides quick access to common usage patterns and advanced flag combinations for users who need a refresher. It is an excellent resource for learning the tool's capabilities without consulting external documentation.
    command: "k8scan show-examples"