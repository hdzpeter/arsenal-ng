tool: tldfinder
tags: [recon, enumeration, osint, security, pentest, infrastructure]

actions:
# === DISCOVERY ACTIONS ===
 - title: tldfinder - basic TLD discovery
   desc: |
     Performs a standard discovery scan for the specified domain name. This command is 
     the primary way to identify private or internal top-level domains associated with an 
     organization. It helps mapping the extended digital footprint that isn't always 
     visible via standard subdomain enumeration.
   command: "tldfinder -d {{target_domain}}"

 - title: tldfinder - comprehensive discovery
   desc: |
     Uses all available sources to find domains and private TLDs, ensuring maximum 
     coverage. While this mode is slower than the default scan, it provides the most 
     thorough results by querying every supported provider. Use this when performing 
     deep reconnaissance where missing a single asset could be critical.
   command: "tldfinder -d {{target_domain}} -all"

 - title: tldfinder - custom discovery mode
   desc: |
     Changes the enumeration logic to focus on specific types of discovery such as dns, 
     tld, or domain. This allows the researcher to pivot their strategy based on the 
     initial findings or specific target infrastructure requirements. The default 
     mode is usually dns, but tld mode is specialized for finding unique suffixes.
   command: "tldfinder -d {{target_domain}} -dm {{mode|tld}}"

# === FILTERING AND SOURCES ===
 - title: tldfinder - filter by specific sources
   desc: |
     Restricts the discovery process to a comma-separated list of specific sources. 
     This is useful for focusing on providers that are known to have high-quality 
     data for a specific region or target type. It also helps in avoiding sources 
     that may be slow or currently experiencing downtime.
   command: "tldfinder -d {{target_domain}} -s {{sources|censys,whoisxmlapi}}"

 - title: tldfinder - exclude specific sources
   desc: |
     Skips the specified sources during the enumeration process to save time or avoid 
     rate limits. If a particular source is consistently failing or providing duplicate 
     data, excluding it can significantly streamline the discovery workflow. Use the 
     -ls flag first to identify the exact names of the sources you wish to exclude.
   command: "tldfinder -d {{target_domain}} -es {{excluded_sources|dnsrepo}}"

 - title: tldfinder - match specific domain patterns
   desc: |
     Filters the output to only display domains that match a specific string or 
     a list provided in a file. This is helpful when looking for specific sub-brands 
     or environments (like "dev" or "prod") within a massive list of results. It 
     reduces manual work by focusing only on relevant patterns for the engagement.
   command: "tldfinder -d {{target_domain}} -m {{match_pattern|dev}}"

# === RESOLUTION AND OUTPUT ===
 - title: tldfinder - resolve active domains
   desc: |
     Attempts to resolve the discovered domains to ensure they are currently active. 
     This action filters out historical or dead records, providing a list of 
     reachable targets for further exploitation or vulnerability scanning. Note 
     that this increases network traffic and may be detected by security monitoring.
   command: "tldfinder -d {{target_domain}} -active"

 - title: tldfinder - include IP addresses
   desc: |
     Displays the IP addresses associated with active domains found during the scan. 
     This requirement necessitates the use of the -active flag to perform the DNS 
     resolution. It provides immediate context regarding the hosting environment 
     and allows for IP-based filtering or grouping of assets.
   command: "tldfinder -d {{target_domain}} -active -oI"

 - title: tldfinder - structured JSON output
   desc: |
     Exports the discovery results into a JSON Lines format for easy processing 
     by other tools. This is the preferred method for integrating tldfinder into 
     automated CI/CD pipelines or custom reconnaissance frameworks. It captures 
     all metadata including the source of each found domain if configured.
   command: "tldfinder -d {{target_domain}} -oJ -o {{output_file|results.json}}"

# === UTILITIES ===
 - title: tldfinder - silent mode for piping
   desc: |
     Suppresses the banner and all informational messages, outputting only the 
     discovered domains. This is essential when piping the output directly into 
     other tools like httpx, nmap, or subfinder. It prevents errors caused by 
     non-domain strings being passed down the command line pipeline.
   command: "tldfinder -d {{target_domain}} -silent"

 - title: tldfinder - list all available sources
   desc: |
     Prints a comprehensive list of all data sources currently supported by the 
     tool. This is useful for verifying which providers are active and checking 
     if you have the necessary API keys configured for paid services. It should 
     be run periodically to see new sources added in tool updates.
   command: "tldfinder -ls"

 - title: tldfinder - update tool
   desc: |
     Updates the tldfinder binary to the latest available version from the 
     official repository. Keeping the tool updated ensures you have the latest 
     source modules, bug fixes, and performance improvements. It may require 
     write permissions to the directory where the binary is located.
   command: "tldfinder -up"